<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VXMP - Ultimate Exploit Hub</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Exo+2:wght@300;400;600;800&family=Roboto:wght@300;400;500&display=swap');
        
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Roboto', sans-serif;
            background: #000;
            color: #e0e0e0;
            min-height: 100vh;
            overflow-x: hidden;
            position: relative;
        }

        /* Enhanced particle system */
        .matrix-bg {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 1;
            background: radial-gradient(circle at 20% 80%, rgba(120, 119, 198, 0.3) 0%, transparent 50%),
                        radial-gradient(circle at 80% 20%, rgba(139, 92, 246, 0.3) 0%, transparent 50%),
                        radial-gradient(circle at 40% 40%, rgba(168, 85, 247, 0.2) 0%, transparent 50%);
        }

        .particles {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 2;
        }

        .particle {
            position: absolute;
            background: linear-gradient(45deg, #8b5cf6, #a855f7, #c084fc);
            border-radius: 50%;
            animation: float 8s ease-in-out infinite;
            box-shadow: 0 0 20px rgba(139, 92, 246, 0.5);
        }

        .matrix-char {
            position: absolute;
            font-family: 'Orbitron', monospace;
            font-size: 12px;
            color: rgba(139, 92, 246, 0.6);
            animation: fall linear infinite;
            white-space: nowrap;
        }

        @keyframes float {
            0%, 100% { transform: translateY(0) scale(1) rotate(0deg); opacity: 0.4; }
            33% { transform: translateY(-30px) scale(1.2) rotate(120deg); opacity: 0.8; }
            66% { transform: translateY(-15px) scale(0.9) rotate(240deg); opacity: 0.6; }
        }

        @keyframes fall {
            0% { transform: translateY(-100vh) rotateX(0deg); opacity: 1; }
            100% { transform: translateY(100vh) rotateX(360deg); opacity: 0; }
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 20px;
            position: relative;
            z-index: 20;
        }

        /* Enhanced Header */
        .header {
            text-align: center;
            margin: 60px 0 80px 0;
            animation: glitchIn 1.5s ease-out;
        }

        .logo-container {
            position: relative;
            display: inline-block;
        }

        .logo {
            font-family: 'Exo 2', sans-serif;
            font-size: clamp(3rem, 8vw, 6rem);
            font-weight: 800;
            background: linear-gradient(45deg, #8b5cf6 0%, #a855f7 25%, #c084fc 50%, #8b5cf6 75%, #a855f7 100%);
            background-size: 400% 400%;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            animation: gradientShift 2.5s ease infinite, neonGlow 1.5s ease-in-out infinite alternate;
            text-shadow: 0 0 40px rgba(139, 92, 246, 0.7);
            letter-spacing: 4px;
        }

        .logo::after {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: linear-gradient(45deg, transparent 30%, rgba(255,255,255,0.3) 50%, transparent 70%);
            transform: translateX(-100%) translateY(-100%) rotate(45deg);
            animation: shine 3s infinite;
        }

        @keyframes glitchIn {
            0% { transform: scale(0.3) rotate(-10deg); opacity: 0; }
            50% { transform: scale(1.1) rotate(5deg); opacity: 0.8; }
            100% { transform: scale(1) rotate(0deg); opacity: 1; }
        }

        @keyframes gradientShift {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        @keyframes neonGlow {
            0% { filter: drop-shadow(0 0 10px #8b5cf6) drop-shadow(0 0 20px #8b5cf6); }
            100% { filter: drop-shadow(0 0 20px #a855f7) drop-shadow(0 0 40px #a855f7); }
        }

        @keyframes shine {
            0% { transform: translateX(-100%) translateY(-100%) rotate(45deg); }
            100% { transform: translateX(100%) translateY(100%) rotate(45deg); }
        }

        .tagline {
            font-size: 1.4rem;
            color: #b8b8b8;
            margin-top: 20px;
            font-weight: 300;
            animation: fadeInUp 1s ease-out 0.5s both;
        }

        /* Navigation */
        .nav-container {
            display: flex;
            justify-content: center;
            margin-bottom: 60px;
        }

        .nav-tabs {
            display: flex;
            background: rgba(15, 15, 25, 0.9);
            backdrop-filter: blur(30px);
            border: 1px solid rgba(139, 92, 246, 0.3);
            border-radius: 25px;
            padding: 8px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.5), 0 0 30px rgba(139, 92, 246, 0.2);
            animation: slideUp 1s ease-out 0.8s both;
        }

        .nav-btn {
            flex: 1;
            padding: 22px 30px;
            background: transparent;
            border: none;
            color: #9ca3af;
            font-size: 1.25rem;
            font-weight: 600;
            font-family: 'Exo 2', sans-serif;
            border-radius: 18px;
            cursor: pointer;
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            position: relative;
            overflow: hidden;
        }

        .nav-btn::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(139, 92, 246, 0.4), transparent);
            transition: left 0.6s;
        }

        .nav-btn:hover::before {
            left: 100%;
        }

        .nav-btn.active {
            background: linear-gradient(135deg, #8b5cf6, #a855f7);
            color: white;
            box-shadow: 0 10px 40px rgba(139, 92, 246, 0.5);
            transform: translateY(-3px);
        }

        /* Content */
        .tab-panel {
            display: none;
            animation: fadeInScale 0.8s cubic-bezier(0.25, 0.46, 0.45, 0.94);
        }

        .tab-panel.active {
            display: block;
        }

        @keyframes fadeInScale {
            0% { opacity: 0; transform: scale(0.95) translateY(30px); }
            100% { opacity: 1; transform: scale(1) translateY(0); }
        }

        .section-title {
            font-family: 'Orbitron', monospace;
            font-size: 2.5rem;
            text-align: center;
            margin-bottom: 50px;
            background: linear-gradient(45deg, #8b5cf6, #a855f7);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            animation: gradientShift 3s ease infinite;
        }

        .content-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(380px, 1fr));
            gap: 35px;
            margin-bottom: 60px;
        }

        .exploit-card {
            background: rgba(20, 20, 35, 0.85);
            backdrop-filter: blur(25px);
            border: 2px solid rgba(139, 92, 246, 0.2);
            border-radius: 25px;
            padding: 40px 30px;
            transition: all 0.5s cubic-bezier(0.4, 0, 0.2, 1);
            position: relative;
            overflow: hidden;
            cursor: pointer;
        }

        .exploit-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 5px;
            background: linear-gradient(90deg, #8b5cf6, #a855f7, #c084fc, #8b5cf6);
            background-size: 300% 100%;
            transform: scaleX(0);
            transition: transform 0.5s ease;
            animation: gradientShift 2s ease infinite;
        }

        .exploit-card:hover::before {
            transform: scaleX(1);
        }

        .exploit-card:hover {
            transform: translateY(-15px) scale(1.03);
            box-shadow: 0 30px 80px rgba(139, 92, 246, 0.4);
            border-color: rgba(139, 92, 246, 0.6);
        }

        .card-badge {
            position: absolute;
            top: 20px;
            right: 20px;
            background: linear-gradient(135deg, #10b981, #059669);
            color: white;
            padding: 8px 16px;
            border-radius: 20px;
            font-size: 0.8rem;
            font-weight: 600;
            box-shadow: 0 5px 15px rgba(16, 185, 129, 0.4);
        }

        .card-icon {
            font-size: 4rem;
            display: block;
            margin-bottom: 25px;
            filter: drop-shadow(0 0 20px rgba(139, 92, 246, 0.5));
        }

        .card-title {
            font-family: 'Exo 2', sans-serif;
            font-size: 1.8rem;
            color: #ffffff;
            margin-bottom: 15px;
            font-weight: 600;
        }

        .card-desc {
            color: #b8b8b8;
            line-height: 1.7;
            margin-bottom: 25px;
            font-weight: 300;
        }

        .download-btn {
            display: inline-flex;
            align-items: center;
            gap: 10px;
            background: linear-gradient(135deg, #8b5cf6, #a855f7);
            color: white;
            padding: 18px 35px;
            border-radius: 50px;
            text-decoration: none;
            font-weight: 700;
            font-size: 1.1rem;
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            box-shadow: 0 15px 40px rgba(139, 92, 246, 0.4);
            position: relative;
            overflow: hidden;
        }

        .download-btn::after {
            content: '↓';
            font-size: 1.2rem;
        }

        .download-btn:hover {
            transform: translateY(-5px) scale(1.05);
            box-shadow: 0 25px 60px rgba(139, 92, 246, 0.6);
        }

        /* Discord Section */
        .discord-hero {
            background: linear-gradient(135deg, rgba(139, 92, 246, 0.25), rgba(168, 85, 247, 0.2), rgba(192, 132, 252, 0.15));
            backdrop-filter: blur(40px);
            border: 2px solid rgba(139, 92, 246, 0.5);
            border-radius: 30px;
            padding: 70px 50px;
            text-align: center;
            margin: 80px 0;
            position: relative;
            overflow: hidden;
            animation: pulseGlow 3s ease-in-out infinite alternate;
        }

        .discord-hero::before {
            content: '';
            position: absolute;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: radial-gradient(circle, rgba(139, 92, 246, 0.1) 0%, transparent 70%);
            animation: rotate 20s linear infinite;
        }

        @keyframes rotate {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        @keyframes pulseGlow {
            0% { box-shadow: 0 0 40px rgba(139, 92, 246, 0.4), inset 0 0 40px rgba(139, 92, 246, 0.1); }
            100% { box-shadow: 0 0 80px rgba(139, 92, 246, 0.7), inset 0 0 80px rgba(139, 92, 246, 0.2); }
        }

        .discord-title {
            font-family: 'Orbitron', monospace;
            font-size: 3rem;
            margin-bottom: 25px;
            color: #ffffff;
            text-shadow: 0 0 30px rgba(139, 92, 246, 0.8);
        }

        .discord-btn {
            display: inline-flex;
            align-items: center;
            gap: 15px;
            background: linear-gradient(135deg, #7289da, #5865f2, #4752c4);
            color: white;
            padding: 25px 60px;
            border-radius: 60px;
            text-decoration: none;
            font-size: 1.4rem;
            font-weight: 800;
            font-family: 'Exo 2', sans-serif;
            box-shadow: 0 20px 60px rgba(114, 137, 218, 0.5);
            transition: all 0.5s cubic-bezier(0.4, 0, 0.2, 1);
            position: relative;
            overflow: hidden;
        }

        .discord-btn::before {
            content: '👑';
            font-size: 1.5rem;
        }

        .discord-btn:hover {
            transform: translateY(-8px) scale(1.08);
            box-shadow: 0 30px 80px rgba(114, 137, 218, 0.7);
        }

        /* Animations */
        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(50px); }
            to { opacity: 1; transform: translateY(0); }
        }

        @keyframes slideUp {
            from { transform: translateY(100px); opacity: 0; }
            to { transform: translateY(0); opacity: 1; }
        }

        /* Responsive */
        @media (max-width: 768px) {
            .content-grid { grid-template-columns: 1fr; gap: 25px; }
            .nav-tabs { flex-direction: column; }
            .logo { font-size: 2.8rem; letter-spacing: 2px; }
            .discord-hero { padding: 50px 30px; margin: 50px 20px; }
            .section-title { font-size: 2rem; }
        }
    </style>
</head>
<body>
    <div class="matrix-bg"></div>
    <div class="particles" id="particles"></div>

    <div class="container">
        <header class="header">
            <div class="logo-container">
                <h1 class="logo">VXMP</h1>
            </div>
            <p class="tagline">The Ultimate Exploit & Script Ecosystem</p>
        </header>

        <div class="nav-container">
            <nav class="nav-tabs">
                <button class="nav-btn active" onclick="switchTab('scripts')">
                    🧬 Scripts Hub
                </button>
                <button class="nav-btn" onclick="switchTab('executors')">
                    ⚡ Executor Vault
                </button>
            </nav>
        </div>

        <main>
            <!-- Scripts Tab -->
            <section id="scripts" class="tab-panel active">
                <h2 class="section-title">Script Repository</h2>
                <div class="content-grid">
                    <div class="exploit-card">
                        <span class="card-badge">POPULAR</span>
                        <span class="card-icon">🎮
